name: Deploy Bravado SaaS Platform

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing/production
  
  # on:
  #   push:
  #     branches: [ main ] # Currently disabled to prevent accidental deployment charges

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Define environment to use "Production" secrets/protection rules
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to Azure using Service Principal Secret
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Azure Container Registry (ACR) Login
      - name: ACR Login
        run: az acr login --name bravadoacr

      # 3. Build & Push API Image
      - name: Build & Push API
        run: |
          docker build -t bravadoacr.azurecr.io/api:${{ github.sha }} -f ./app/api/Dockerfile ./app/api
          docker push bravadoacr.azurecr.io/api:${{ github.sha }}

      # 4. Build & Push Worker Image
      - name: Build & Push Worker
        run: |
          docker build -t bravadoacr.azurecr.io/worker:${{ github.sha }} -f ./app/worker/Dockerfile ./app/worker
          docker push bravadoacr.azurecr.io/worker:${{ github.sha }}

      # 5. Set AKS Context
      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'bravado-resources'
          cluster-name: 'bravado-aks'

      # 6. Install/Upgrade Application via Helm
      # Note: Secrets are passed from GitHub Secrets to Helm --set flags
      - name: Deploy Core Platform
        run: |
          helm upgrade --install bravado-platform ./charts/bravado-stack \
            --namespace production \
            --create-namespace \
            --set api.image.tag=${{ github.sha }} \
            --set worker.image.tag=${{ github.sha }} \
            --set global.stripeSecretKey=${{ secrets.STRIPE_SECRET_KEY }} \
            --set global.openaiApiKey=${{ secrets.OPENAI_API_KEY }} \
            --values ./charts/bravado-stack/values-prod.yaml

      # 7. Update the Usage Sync CronJob (Infrastructure Maintenance)
      - name: Update Usage Sync CronJob
        run: |
          kubectl apply -f base/usage-cron.yaml --namespace production
          kubectl set image cronjob/bravado-usage-sync \
            sync-worker=bravadoacr.azurecr.io/api:${{ github.sha }} \
            --namespace production

      # 8. Post-Deployment Smoke Test
      - name: Smoke Test
        run: |
          echo "Waiting for LoadBalancer to be ready..."
          sleep 30
          CLUSTER_IP=$(kubectl get svc api-service -n production -o jsonpath='{.status.loadBalancer.ingress.ip}')
          if [ -z "$CLUSTER_IP" ]; then
            echo "LoadBalancer IP not assigned yet. Check AKS portal."
            exit 1
          fi
          curl --fail http://$CLUSTER_IP/health || exit 1
